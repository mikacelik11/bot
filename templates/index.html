<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatbot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <div id="chat-container">
    <div id="chat-header">
      <h2>Chatbot</h2>
      <!-- TODO: Add a subtitle or bot name here -->
    </div>

    <div id="chat-window">
      <!-- Messages will appear here dynamically -->
      <!-- TODO: Optionally add a welcome message on load -->
    </div>

    <div id="input-area">
      <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off" />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const chatWindow = document.getElementById("chat-window");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    // Adds a message bubble to the chat window
    function appendMessage(text, sender) {
      const msg = document.createElement("div");
      msg.classList.add("message", sender); // sender = "user" or "bot"
      msg.textContent = text;
      chatWindow.appendChild(msg);
      chatWindow.scrollTop = chatWindow.scrollHeight; // auto-scroll
    }

    // Sends the message to Flask and displays the response
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      appendMessage(text, "user");
      userInput.value = "";

      // TODO: Add a loading indicator while waiting for response

      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });

      const data = await response.json();
      appendMessage(data.reply, "bot");

      // TODO: Handle fetch errors gracefully
    }

    // Send on button click
    sendBtn.addEventListener("click", sendMessage);

    // Send on Enter key
    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>

</body>
</html>
